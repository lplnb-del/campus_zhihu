# ==========================================
# CampusZhihu Test Configuration
# ==========================================
spring:
  application:
    name: campus-zhihu-test

  # MySQL 数据库配置（正式环境）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_zhihu?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: LPL20041212nb
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 5
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      pool-prepared-statements: true
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  # SQL 初始化配置
  sql:
    init:
      mode: never

  # Jackson 配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  # 邮件配置（测试环境禁用）
  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
        debug: false

  # Security 配置
  security:
    user:
      name: admin
      password: admin

  # Redis 配置（测试环境禁用）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Cache 配置
  cache:
    type: redis
    redis:
      time-to-live: 1800000
      cache-null-values: false
      key-prefix: "campus:"
      use-key-prefix: true

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.zhihu.entity
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false

# MinIO 文件存储配置（测试环境禁用）
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: campus-zhihu-test

# JWT 配置
jwt:
  secret: test-secret-key-for-integration-testing-purpose-only
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  expiration: 604800000
  header: Authorization
  prefix: Bearer

# 服务器配置
server:
  port: 0  # 随机端口

# 日志配置
logging:
  level:
    root: WARN
    com.campus.zhihu: INFO
    com.campus.zhihu.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 自定义业务配置
campus:
  app:
    url: http://localhost:3000

  points:
    register: 100
    answer-accepted: 10
    daily-login: 5

  page:
    default-size: 10
    max-size: 100