# ==========================================
# CampusZhihu 生产环境配置
# ==========================================
# ⚠️ 安全提醒：所有敏感信息已通过环境变量注入
# 请在启动前设置以下环境变量：
# - DB_PASSWORD: 数据库密码
# - JWT_SECRET: JWT密钥（至少32位随机字符串）
# - DRUID_PASSWORD: Druid监控密码
# - MINIO_ACCESS_KEY: MinIO访问密钥
# - MINIO_SECRET_KEY: MinIO秘密密钥

spring:
  application:
    name: campus-zhihu

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_zhihu?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD} # ✅ 使用环境变量
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      pool-prepared-statements: true
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        login-username: ${DRUID_USERNAME:admin} # ✅ 使用环境变量，默认admin
        login-password: ${DRUID_PASSWORD} # ✅ 使用环境变量

  # Jackson 配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.zhihu.entity
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境使用 SLF4J 日志（性能更优）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    cache-enabled: true # ✅ 生产环境启用二级缓存

# MinIO 文件存储配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000} # ✅ 使用环境变量，默认本地
  access-key: ${MINIO_ACCESS_KEY} # ✅ 使用环境变量
  secret-key: ${MINIO_SECRET_KEY} # ✅ 使用环境变量
  bucket-name: campus-zhihu

# JWT 配置
jwt:
  secret: ${JWT_SECRET} # ✅ 使用环境变量（至少32位随机字符串）
  expiration: 604800000 # 7天
  header: Authorization
  prefix: Bearer

# 服务器配置
server:
  port: ${SERVER_PORT:8080} # ✅ 使用环境变量，默认8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      min-spare: 10

# 日志配置（生产环境）
logging:
  level:
    root: INFO
    com.campus.zhihu: INFO # ✅ 生产环境降低日志级别
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/campus-zhihu.log
    max-size: 10MB
    max-history: 30

# 自定义业务配置
campus:
  points:
    register: 100
    answer-accepted: 10
    daily-login: 5
  page:
    default-size: 10
    max-size: 100
